<div class="flex h-screen overflow-hidden bg-[var(--bg-main)]">
    <!-- Sidebar -->
    <aside class="w-72 bg-[var(--bg-sidebar)] border-r border-[var(--border-color)] flex flex-col z-20 shrink-0">
        <div class="p-6 border-b border-[var(--border-color)]">
            <h1 class="text-xl font-bold text-[var(--text-primary)]">
                <a href="/" class="hover:text-blue-500 transition-colors">Race Calendar</a>
            </h1>
            <p class="text-xs text-[var(--text-secondary)] mt-1">EntryBoss Discovery Tool</p>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-8">
            <section>
                <h3 class="text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wider mb-3 px-2">Navigation</h3>
                <a href="/" class="flex items-center gap-2 px-3 py-2 text-sm text-[var(--text-secondary)] hover:text-blue-600 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to Calendar
                </a>
            </section>
        </div>

        <div class="p-4 border-t border-[var(--border-color)]">
            <div class="px-3 py-2 text-xs text-[var(--text-muted)]">
                Version Desktop 1.2.0
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-[var(--bg-card)] border-b border-[var(--border-color)] flex items-center justify-between px-8 shrink-0 z-10">
            <h2 class="text-lg font-bold text-[var(--text-primary)]">About this project</h2>
            <div class="flex items-center gap-4">
                <button id="dark-mode-toggle" class="w-10 h-10 flex items-center justify-center text-[var(--text-primary)] bg-[var(--bg-card)] hover:bg-[var(--bg-main)] rounded-xl border border-[var(--border-color)] transition-all shadow-sm active:scale-95" title="Toggle Dark Mode">
                    <svg id="dark-mode-icon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <!-- Icon path will be set by JS -->
                    </svg>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 bg-[var(--bg-main)]">
            <div class="max-w-3xl mx-auto space-y-8">
                <!-- About Section -->
                <div class="bg-[var(--bg-card)] rounded-xl shadow-sm border border-[var(--border-color)] p-8" data-section="what-is-this">
                    <h2 class="text-2xl font-bold text-[var(--text-primary)] mb-6">What is this?</h2>
                    <div class="prose dark:prose-invert max-w-none text-[var(--text-secondary)]" data-content>
                        <!-- Content loaded by about-content.js -->
                    </div>
                </div>

                <!-- Contact Section -->
                <div class="bg-[var(--bg-card)] rounded-xl shadow-sm border border-[var(--border-color)] p-8" data-section="contact">
                    <h2 class="text-2xl font-bold text-[var(--text-primary)] mb-6">Contact</h2>
                    <div class="prose dark:prose-invert max-w-none text-[var(--text-secondary)]" data-content>
                        <!-- Content loaded by about-content.js -->
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
